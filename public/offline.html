<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Taskboard offline</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 28rem), #0b0b0f; color: #f4f4f5; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(34rem, calc(100vw - 2rem)); border: 1px solid rgba(255,255,255,.12); border-radius: 2rem; background: rgba(24,24,27,.78); padding: 2rem; box-shadow: 0 24px 80px rgba(0,0,0,.45); }
      p { color: #a1a1aa; line-height: 1.7; }
      a { color: #93c5fd; }
    </style>
  </head>
  <body>
    <main>
      <p style="letter-spacing:.25em;text-transform:uppercase;color:#93c5fd;font-size:.75rem;">Taskboard</p>
      <h1>Du bist gerade offline.</h1>
      <p>Die installierte App ist erreichbar, aber echte Offline-Synchronisierung ist noch ein späterer Entwicklungsschritt. Sobald du wieder online bist, lade das Board erneut.</p>
      <p><a href="/board">Zurück zum Board</a></p>
    </main>
  </body>
</html>
